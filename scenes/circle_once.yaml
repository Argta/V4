name: circle_once
description: >
  Sound source circles around the listener once at 2m radius.
  6.5 seconds, human voice, active head tracking.
  Full 360-degree coverage tests all azimuth angles.

room:
  dimensions: [8, 8, 3]
  absorption: 0.3
  max_order: 3

microphone:
  head_center: [4.0, 4.0, 1.5]
  head_radius: 0.09
  hrtf_mode: parametric

source:
  generator: human_voice
  duration: 6.5
  sample_rate: 44100

motion:
  enabled: true
  type: circle
  center: [4.0, 4.0, 1.5]
  radius: 2.0
  speed: 2.0

output:
  sample_rate: 44100
  visualize: true

noise:
  enabled: false
  background_snr_db: 30.0
  sensor_snr_db: 40.0

localization:
  method: gcc_phat
  frame_duration_ms: 50.0
  frame_hop_ms: 25.0
  freq_range: [300, 3000]
  active_head: true

evaluation:
  enabled: true
