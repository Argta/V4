name: head_rotate_test
description: >
  Static source at 60 deg right-front. Head rotates right at 30 deg/s.
  Tests whether localization tracks head-local azimuth correctly:
  t=0s: 60deg, t=1s: 30deg, t=2s: 0deg, t=3s: -30deg.
  Anechoic room for clean signal, 4s duration.

room:
  dimensions: [8, 8, 3]
  absorption: 1.0
  max_order: 0

microphone:
  head_center: [4.0, 4.0, 1.5]
  head_radius: 0.09
  hrtf_mode: parametric

source:
  generator: human_voice
  duration: 4.0
  sample_rate: 44100

motion:
  enabled: false
  type: static
  position: [5.732, 5.0, 1.5]

output:
  sample_rate: 44100
  visualize: true

noise:
  enabled: false
  background_snr_db: 30.0
  sensor_snr_db: 40.0

localization:
  method: gcc_phat
  frame_duration_ms: 50.0
  frame_hop_ms: 25.0
  freq_range: [300, 3000]
  active_head: true

evaluation:
  enabled: true
