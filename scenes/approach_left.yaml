name: approach_left
description: >
  Sound source starts far in front (y=7.5, 3.5m away), approaches the
  listener diagonally, ending near the left side (x=1.5, y=4.5, ~1.5m away).
  Both distance and direction change continuously. 3 seconds, human voice.

room:
  dimensions: [8, 8, 3]
  absorption: 0.3
  max_order: 3

microphone:
  head_center: [4.0, 4.0, 1.5]
  head_radius: 0.09
  hrtf_mode: parametric

source:
  generator: human_voice
  duration: 3.0
  sample_rate: 44100

motion:
  enabled: true
  type: linear
  start: [4.0, 7.5, 1.5]
  end: [1.5, 4.5, 1.5]
  speed: 1.3

output:
  sample_rate: 44100
  visualize: true

noise:
  enabled: false
  background_snr_db: 30.0
  sensor_snr_db: 40.0

localization:
  method: gcc_phat
  frame_duration_ms: 50.0
  frame_hop_ms: 25.0
  freq_range: [300, 3000]
  active_head: true

evaluation:
  enabled: true
