name: rear_moving_linear
description: >
  Sound source moves linearly behind the listener from left-rear to right-rear.
  3 seconds, human voice. Tests continuous FB tracking during motion.

room:
  dimensions: [8, 8, 3]
  absorption: 0.3
  max_order: 3

microphone:
  head_center: [4.0, 4.0, 1.5]
  head_radius: 0.09
  hrtf_mode: parametric

source:
  generator: human_voice
  duration: 3.0
  sample_rate: 44100

motion:
  enabled: true
  type: linear
  start: [1.5, 1.5, 1.5]
  end: [6.5, 1.5, 1.5]
  speed: 1.7

output:
  sample_rate: 44100
  visualize: true

noise:
  enabled: false
  background_snr_db: 30.0
  sensor_snr_db: 40.0

localization:
  method: llr
  frame_duration_ms: 50.0
  frame_hop_ms: 25.0
  freq_range: [300, 3000]
  active_head: true
  llr_base_threshold: 3.0

evaluation:
  enabled: true
